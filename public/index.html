<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Учёт давления</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #e8f1fb 0%, #ffffff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 28px 24px 32px;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    text-align: center;
    font-size: 26px;
    color: #1a3a5c;
    margin: 0 0 4px;
  }
  .subtitle {
    text-align: center;
    color: #6b7c93;
    font-size: 16px;
    margin-bottom: 22px;
  }
  label.section-label {
    display: block;
    font-size: 18px;
    font-weight: 700;
    color: #1a3a5c;
    margin: 0 0 10px;
  }
  .time-select {
    display: flex;
    gap: 12px;
    margin-bottom: 26px;
  }
  .time-btn {
    flex: 1;
    padding: 16px 8px;
    font-size: 18px;
    font-weight: 600;
    border: 3px solid #d6e4f5;
    border-radius: 16px;
    background: #f7fafd;
    color: #1a3a5c;
    cursor: pointer;
    transition: all 0.15s;
  }
  .time-btn.active {
    border-color: #2e7dd1;
    background: #2e7dd1;
    color: #fff;
  }
  .person {
    border: 2px solid #e7eef8;
    border-radius: 20px;
    padding: 18px 16px 20px;
    margin-bottom: 18px;
  }
  .person-name {
    font-size: 20px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 14px;
  }
  label.field-label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: #5c6f88;
    margin: 12px 0 6px;
  }
  .row {
    display: flex;
    gap: 10px;
  }
  input[type=number] {
    width: 100%;
    font-size: 24px;
    text-align: center;
    padding: 14px 8px;
    border: 3px solid #d6e4f5;
    border-radius: 14px;
    background: #f7fafd;
    color: #1a3a5c;
    -moz-appearance: textfield;
  }
  input[type=number]:focus {
    outline: none;
    border-color: #2e7dd1;
    background: #fff;
  }
  .hint {
    font-size: 13px;
    color: #8a9bb0;
    margin-top: 4px;
    text-align: center;
  }
  button.submit {
    width: 100%;
    margin-top: 12px;
    padding: 20px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    background: #2e7dd1;
    border: none;
    border-radius: 18px;
    cursor: pointer;
  }
  button.submit:active { background: #2566ad; }
  button.submit:disabled { background: #aac4e0; }
  .status {
    text-align: center;
    margin-top: 18px;
    font-size: 18px;
    font-weight: 600;
    min-height: 26px;
  }
  .status.ok { color: #1f9d55; }
  .status.err { color: #d23b3b; }
  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 15px;
    color: #8a9bb0;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🩺 Давление</h1>
    <div class="subtitle">Запись результатов измерения</div>

    <label class="section-label">Время измерения</label>
    <div class="time-select">
      <button type="button" class="time-btn" data-time="Утро">☀️ Утро</button>
      <button type="button" class="time-btn" data-time="Вечер">🌙 Вечер</button>
    </div>

    <div class="person">
      <div class="person-name">Людмила</div>
      <label class="field-label">Давление (мм рт. ст.)</label>
      <div class="row">
        <div style="flex:1">
          <input type="number" id="ludmila-systolic" inputmode="numeric" placeholder="120">
          <div class="hint">Верхнее</div>
        </div>
        <div style="flex:1">
          <input type="number" id="ludmila-diastolic" inputmode="numeric" placeholder="80">
          <div class="hint">Нижнее</div>
        </div>
      </div>
      <label class="field-label">Пульс (уд/мин)</label>
      <input type="number" id="ludmila-pulse" inputmode="numeric" placeholder="70">
    </div>

    <div class="person">
      <div class="person-name">Геннадий</div>
      <label class="field-label">Давление (мм рт. ст.)</label>
      <div class="row">
        <div style="flex:1">
          <input type="number" id="gennady-systolic" inputmode="numeric" placeholder="120">
          <div class="hint">Верхнее</div>
        </div>
        <div style="flex:1">
          <input type="number" id="gennady-diastolic" inputmode="numeric" placeholder="80">
          <div class="hint">Нижнее</div>
        </div>
      </div>
      <label class="field-label">Пульс (уд/мин)</label>
      <input type="number" id="gennady-pulse" inputmode="numeric" placeholder="70">
    </div>

    <button class="submit" id="submitBtn">Сохранить</button>
    <div class="status" id="status"></div>
    <div class="footer-note">Спасибо, что помогаете следить за вашим здоровьем! Мы вас любим! ❤️</div>
  </div>

<script>
  let selectedTime = null;
  document.querySelectorAll('.time-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTime = btn.dataset.time;
    });
  });

  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');

  function val(id) { return document.getElementById(id).value; }

  submitBtn.addEventListener('click', async () => {
    if (!selectedTime) {
      showStatus('Выберите утро или вечер', 'err');
      return;
    }

    const people = [
      {
        who: 'Людмила',
        systolic: val('ludmila-systolic'),
        diastolic: val('ludmila-diastolic'),
        pulse: val('ludmila-pulse'),
      },
      {
        who: 'Геннадий',
        systolic: val('gennady-systolic'),
        diastolic: val('gennady-diastolic'),
        pulse: val('gennady-pulse'),
      },
    ];

    for (const p of people) {
      if (!p.systolic || !p.diastolic || !p.pulse) {
        showStatus(`Заполните все поля для ${p.who}`, 'err');
        return;
      }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Сохраняю...';

    try {
      const resp = await fetch('/api/measurement', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timeOfDay: selectedTime, people })
      });
      const data = await resp.json();
      if (resp.ok) {
        showStatus('✅ Сохранено!', 'ok');
        ['ludmila-systolic','ludmila-diastolic','ludmila-pulse',
         'gennady-systolic','gennady-diastolic','gennady-pulse'].forEach(id => {
          document.getElementById(id).value = '';
        });
      } else {
        showStatus(data.error || 'Ошибка сохранения', 'err');
      }
    } catch (e) {
      showStatus('Нет связи с сервером', 'err');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Сохранить';
    }
  });

  function showStatus(text, type) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + type;
    if (type === 'ok') {
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    }
  }
</script>
</body>
</html>
